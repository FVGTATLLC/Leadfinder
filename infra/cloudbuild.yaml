steps:
  # Build backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - "build"
      - "-f"
      - "infra/Dockerfile.backend.prod"
      - "-t"
      - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:latest"
      - "."

  # Build frontend Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - "build"
      - "-f"
      - "infra/Dockerfile.frontend.prod"
      - "-t"
      - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "."

  # Push backend image
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args:
      - "push"
      - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend-latest"
    waitFor: ["build-backend"]
    args:
      - "push"
      - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:latest"

  # Push frontend image
  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args:
      - "push"
      - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend-latest"
    waitFor: ["build-frontend"]
    args:
      - "push"
      - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:latest"

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_BACKEND_SERVICE}"
      - "--image"
      - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8000"
      - "--cpu"
      - "1"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "300"
      - "--allow-unauthenticated"
      - "--vpc-connector"
      - "${_VPC_CONNECTOR}"
      - "--set-env-vars"
      - "DATABASE_URL=${_DATABASE_URL},REDIS_URL=${_REDIS_URL},JWT_SECRET=${_JWT_SECRET},CORS_ORIGINS=${_CORS_ORIGINS}"

  # Deploy frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["push-frontend", "deploy-backend"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_FRONTEND_SERVICE}"
      - "--image"
      - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "3000"
      - "--cpu"
      - "1"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
      - "--allow-unauthenticated"

  # Run database migrations
  - name: "python:3.11-slim"
    id: "run-migrations"
    waitFor: ["deploy-backend"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet --no-cache-dir -e backend/
        cd backend && alembic upgrade head
    env:
      - "DATABASE_URL=${_DATABASE_URL}"

substitutions:
  _PROJECT_ID: "your-project-id"
  _REGION: "us-central1"
  _BACKEND_SERVICE: "salespilot-backend"
  _FRONTEND_SERVICE: "salespilot-frontend"
  _BACKEND_URL: "https://salespilot-backend-xxxxx.run.app"
  _VPC_CONNECTOR: "salespilot-vpc-connector"
  _DATABASE_URL: ""
  _REDIS_URL: ""
  _JWT_SECRET: ""
  _CORS_ORIGINS: ""

images:
  - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:${SHORT_SHA}"
  - "gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:latest"
  - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:${SHORT_SHA}"
  - "gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1800s"
